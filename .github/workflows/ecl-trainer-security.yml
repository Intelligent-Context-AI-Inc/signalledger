name: ECL Trainer Security Gate

on:
  pull_request:
    paths:
      - 'ecl_trainer/**'
      - 'atlas_pipeline/**'
      - 'atlas_sources/**'
      - 'tests/test_lifecycle_freshness.py'
      - 'tests/test_lifecycle_sync.py'
      - 'tests/test_financial_services_seed_fixture.py'
      - 'tests/test_*payload*.py'
      - 'tests/test_*red_team*.py'
      - 'tests/test_*hash*.py'
      - 'tests/test_*signal*.py'
      - 'tests/test_*risk*.py'
      - 'tests/test_*ci*.py'
      - 'tests/test_atlas_pipeline.py'
      - 'tests/test_*huggingface*.py'
      - 'tests/test_*axolotl*.py'
      - 'tests/test_supply_chain_evidence.py'
      - 'tests/test_control_plane_clients.py'
      - 'tests/test_compliance_reports.py'
      - 'tests/test_cli.py'
      - 'pyproject.toml'
      - 'MANIFEST.in'
      - 'Dockerfile.ecl-trainer'
      - 'docs/INTELLIGENT_CONTEXT_ATLAS.md'
      - 'docs/INTELLIGENT_CONTEXT_ATLAS_COLLECTION.md'
      - 'docs/SUPPLY_CHAIN_EVIDENCE.md'
      - '.github/actions/ecl-trainer-scan/action.yml'
      - '.github/workflows/ecl-trainer-security.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4 tag resolved 2026-06-30.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-python v5 tag resolved 2026-06-30.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install ECL Trainer with dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check ecl_trainer atlas_pipeline tests/test_*payload*.py tests/test_*red_team*.py tests/test_*hash*.py tests/test_*signal*.py tests/test_*risk*.py tests/test_*ci*.py tests/test_atlas_pipeline.py tests/test_lifecycle_freshness.py tests/test_lifecycle_sync.py tests/test_financial_services_seed_fixture.py tests/test_*huggingface*.py tests/test_*axolotl*.py tests/test_supply_chain_evidence.py tests/test_control_plane_clients.py tests/test_compliance_reports.py tests/test_cli.py
      - name: Mypy
        run: mypy
      - name: Pyright
        run: pyright
      - name: Bandit
        run: bandit -r ecl_trainer atlas_pipeline
      - name: Pip audit
        run: pip-audit . --skip-editable
      - name: Red-team boundary tests
        run: python -m pytest tests/test_red_team_no_payload_boundaries.py -q
      - name: ECL Trainer test suite
        run: python -m pytest tests/test_no_payload_policy.py tests/test_hash_chain.py tests/test_signal_hasher.py tests/test_value_processor.py tests/test_risk_gatekeeper.py tests/test_ci_scanner.py tests/test_pr_comment_renderer.py tests/test_atlas_pipeline.py tests/test_lifecycle_freshness.py tests/test_lifecycle_sync.py tests/test_financial_services_seed_fixture.py tests/test_huggingface_callback.py tests/test_axolotl_plugin.py tests/test_control_plane_clients.py tests/test_ci_runners.py tests/test_huggingface_cards.py tests/test_compliance_reports.py tests/test_supply_chain_evidence.py tests/test_cli.py tests/test_red_team_no_payload_boundaries.py -q
      - name: Generate supply-chain evidence
        run: ecl-trainer supply-chain-evidence --repository-root . --output-dir .ecl-trainer/supply-chain
      - name: Upload supply-chain evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ecl-trainer-supply-chain-evidence
          if-no-files-found: error
          path: .ecl-trainer/supply-chain/**
      - name: Build package
        run: python -m build
