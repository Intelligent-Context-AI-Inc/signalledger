name: ECL Trainer Scan
description: Metadata-only ECL Trainer CI scan
inputs:
  project_namespace:
    required: true
    description: Project namespace for local ledger events
  ledger_path:
    required: false
    default: .ecl-trainer/events.jsonl
    description: Local append-only event log path
  risk_policy:
    required: false
    default: report_only
    description: report_only, warn, block_on_high_risk, block_on_payload_violation, or block_on_release_risk
  changed_only:
    required: false
    default: 'true'
    description: Scan changed files only
  output_dir:
    required: false
    default: .ecl-trainer/reports
    description: Local directory for metadata-only reports
  post_pr_comment:
    required: false
    default: 'true'
    description: Post or update a metadata-only PR comment when GitHub token permissions allow
  upload_artifact:
    required: false
    default: 'true'
    description: Upload metadata-only report artifacts
  artifact_name:
    required: false
    default: ecl-trainer-local-report
    description: GitHub artifact name for local reports and ledger
  enabled_domains:
    required: false
    default: ''
    description: Comma-separated enabled domain extensions for the Intelligent Context Atlas
  domain_selection_mode:
    required: false
    default: auto
    description: auto, explicit, or core_only
  ignore_staleness:
    required: false
    default: 'false'
    description: Mute non-blocking Atlas lifecycle staleness warnings
  generate_mlops_pack:
    required: false
    default: 'true'
    description: Generate the local MLOps governance pack artifacts
  saas_endpoint:
    required: false
    default: ''
    description: Optional SaaS endpoint
  api_key:
    required: false
    default: ''
    description: Optional SaaS API key
  fail_on_payload_violation:
    required: false
    default: 'true'
    description: Fail when payload policy blocks output
  report_usage:
    required: false
    default: 'false'
    description: Opt in to a metadata-only adoption ping. Disabled by default.
  usage_ping_url:
    required: false
    default: ''
    description: Optional HTTPS endpoint for the adoption ping when report_usage is true
  include_repository_name_in_usage:
    required: false
    default: 'false'
    description: Include owner/repo in the adoption ping. Disabled by default.
  image_mode:
    required: false
    default: auto
    description: auto, published, or local. Auto pulls GHCR first and falls back to a local build.
  image_ref:
    required: false
    default: ghcr.io/intelligent-context-ai-inc/signalledger-ecl-trainer:v0.1.0-alpha.4
    description: Published ECL Trainer image to pull when image_mode is auto or published.
runs:
  using: composite
  steps:
    - name: Resolve ECL Trainer Docker image
      shell: bash
      run: |
        set -euo pipefail
        requested_mode="${{ inputs.image_mode }}"
        image_ref="${{ inputs.image_ref }}"
        local_tag="ecl-trainer-ci:${GITHUB_SHA:-local}"
        action_repo_root="$(cd "${GITHUB_ACTION_PATH}/../../.." && pwd)"
        if [[ "${requested_mode}" != "auto" && "${requested_mode}" != "published" && "${requested_mode}" != "local" ]]; then
          echo "image_mode must be auto, published, or local." >&2
          exit 1
        fi
        if [[ "${requested_mode}" != "local" ]]; then
          if docker pull "${image_ref}"; then
            echo "ECL_TRAINER_IMAGE=${image_ref}" >> "${GITHUB_ENV}"
            echo "ECL_TRAINER_IMAGE_SOURCE=published" >> "${GITHUB_ENV}"
            exit 0
          fi
          if [[ "${requested_mode}" == "published" ]]; then
            echo "Unable to pull published ECL Trainer image: ${image_ref}" >&2
            exit 1
          fi
          echo "Published ECL Trainer image unavailable; falling back to local build."
        fi
        docker build \
          --file "${action_repo_root}/Dockerfile.ecl-trainer" \
          --tag "${local_tag}" \
          "${action_repo_root}"
        echo "ECL_TRAINER_IMAGE=${local_tag}" >> "${GITHUB_ENV}"
        echo "ECL_TRAINER_IMAGE_SOURCE=local_build" >> "${GITHUB_ENV}"

    - name: Generate local training-data risk report and passport
      shell: bash
      env:
        ECL_TRAINER_API_KEY: ''
      run: |
        set +e
        mkdir -p "${{ inputs.output_dir }}"
        changed_flag="--changed-only"
        if [[ "${{ inputs.changed_only }}" != "true" ]]; then
          changed_flag="--no-changed-only"
        fi
        staleness_flag=()
        if [[ "${{ inputs.ignore_staleness }}" == "true" ]]; then
          staleness_flag=(--ignore-staleness)
        fi
        mlops_pack_flag="--generate-mlops-pack"
        if [[ "${{ inputs.generate_mlops_pack }}" != "true" ]]; then
          mlops_pack_flag="--no-generate-mlops-pack"
        fi
        event_mount=()
        if [[ -n "${GITHUB_EVENT_PATH:-}" && -f "${GITHUB_EVENT_PATH}" ]]; then
          event_mount=(-v "${GITHUB_EVENT_PATH}:/github/event.json:ro" -e GITHUB_EVENT_PATH=/github/event.json)
        fi
        docker run --rm \
          -v "${GITHUB_WORKSPACE}:/workspace" \
          "${event_mount[@]}" \
          -e GITHUB_ACTIONS=true \
          -e GITHUB_RUN_ID \
          -e GITHUB_SHA \
          -e GITHUB_REF \
          -e GITHUB_REPOSITORY \
          -e GITHUB_EVENT_NAME \
          -e GITHUB_API_URL \
          -e GITHUB_WORKSPACE=/workspace \
          "${ECL_TRAINER_IMAGE}" \
          github-pr-report \
          --project-namespace "${{ inputs.project_namespace }}" \
          --ledger-path "${{ inputs.ledger_path }}" \
          --risk-policy "${{ inputs.risk_policy }}" \
          --output-dir "${{ inputs.output_dir }}" \
          --enabled-domains "${{ inputs.enabled_domains }}" \
          --domain-selection-mode "${{ inputs.domain_selection_mode }}" \
          "${staleness_flag[@]}" \
          "${mlops_pack_flag}" \
          "${changed_flag}"
        echo "$?" > "${{ inputs.output_dir }}/exit-code"
        exit 0

    - name: Write job summary
      shell: bash
      run: |
        if [[ -f "${{ inputs.output_dir }}/pr-comment.md" && -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          cat "${{ inputs.output_dir }}/pr-comment.md" >> "${GITHUB_STEP_SUMMARY}"
        fi

    - name: Write optional metadata-only usage ping
      if: inputs.report_usage == 'true'
      shell: bash
      env:
        ECL_USAGE_OUTPUT_DIR: ${{ inputs.output_dir }}
        ECL_USAGE_RISK_POLICY: ${{ inputs.risk_policy }}
        ECL_USAGE_CHANGED_ONLY: ${{ inputs.changed_only }}
        ECL_USAGE_DOMAIN_SELECTION_MODE: ${{ inputs.domain_selection_mode }}
        ECL_USAGE_ENABLED_DOMAINS: ${{ inputs.enabled_domains }}
        ECL_USAGE_INCLUDE_REPOSITORY_NAME: ${{ inputs.include_repository_name_in_usage }}
        ECL_USAGE_PING_URL: ${{ inputs.usage_ping_url }}
      run: |
        set +e
        mkdir -p "${ECL_USAGE_OUTPUT_DIR}"
        python3 - <<'PY'
        import json
        import os
        from datetime import datetime, timezone
        from pathlib import Path

        output_dir = Path(os.environ["ECL_USAGE_OUTPUT_DIR"])
        manifest_path = output_dir / "manifest.json"
        risk_report_path = output_dir / "risk-report.json"

        def load_json(path):
            if not path.exists():
                return {}
            try:
                value = json.loads(path.read_text(encoding="utf-8"))
            except Exception:
                return {}
            return value if isinstance(value, dict) else {}

        manifest = load_json(manifest_path)
        risk_report = load_json(risk_report_path)
        enabled_domains = [
            part.strip()
            for part in os.environ.get("ECL_USAGE_ENABLED_DOMAINS", "").split(",")
            if part.strip()
        ]
        include_repo = os.environ.get("ECL_USAGE_INCLUDE_REPOSITORY_NAME", "false").lower() == "true"
        payload = {
            "schema": "signalledger_action_usage_ping_v1",
            "created_at_utc": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
            "action": "Intelligent-Context-AI-Inc/signalledger/.github/actions/ecl-trainer-scan",
            "action_ref": os.environ.get("GITHUB_ACTION_REF") or "unknown",
            "repository_visibility": os.environ.get("GITHUB_REPOSITORY_VISIBILITY") or "unknown",
            "repository_included": include_repo,
            "event_name": os.environ.get("GITHUB_EVENT_NAME") or "unknown",
            "runner_os": os.environ.get("RUNNER_OS") or "unknown",
            "image_source": os.environ.get("ECL_TRAINER_IMAGE_SOURCE") or "unknown",
            "risk_policy": os.environ.get("ECL_USAGE_RISK_POLICY") or "unknown",
            "changed_only": os.environ.get("ECL_USAGE_CHANGED_ONLY") == "true",
            "domain_selection_mode": os.environ.get("ECL_USAGE_DOMAIN_SELECTION_MODE") or "unknown",
            "enabled_domain_count": len(enabled_domains),
            "payload_policy": manifest.get("payload_policy") or risk_report.get("payload_policy") or "unknown",
            "risk_gate_status": manifest.get("risk_gate_status") or "unknown",
            "should_fail": bool(manifest.get("should_fail", risk_report.get("should_fail", False))),
            "artifact_bundle_type": manifest.get("mode") or "local-only",
            "retained_raw_payload": False,
        }
        if include_repo:
            payload["repository"] = os.environ.get("GITHUB_REPOSITORY") or "unknown"
        (output_dir / "usage-ping.json").write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
        PY
        if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          {
            echo ""
            echo "### SignalLedger optional usage ping"
            echo ""
            echo "- Usage ping enabled: \`true\`"
            echo "- Repository name included: \`${ECL_USAGE_INCLUDE_REPOSITORY_NAME}\`"
            echo "- Local ping file: \`${ECL_USAGE_OUTPUT_DIR}/usage-ping.json\`"
            if [[ -n "${ECL_USAGE_PING_URL}" ]]; then
              echo "- Ping endpoint configured: \`true\`"
            else
              echo "- Ping endpoint configured: \`false\`"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
        fi
        if [[ -n "${ECL_USAGE_PING_URL}" ]]; then
          curl --fail --silent --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --data @"${ECL_USAGE_OUTPUT_DIR}/usage-ping.json" \
            "${ECL_USAGE_PING_URL}" || true
        fi
        exit 0

    - name: Post sticky PR comment
      if: inputs.post_pr_comment == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        if [[ ! -f "${{ inputs.output_dir }}/pr-comment.md" ]]; then
          exit 0
        fi
        event_mount=()
        if [[ -n "${GITHUB_EVENT_PATH:-}" && -f "${GITHUB_EVENT_PATH}" ]]; then
          event_mount=(-v "${GITHUB_EVENT_PATH}:/github/event.json:ro" -e GITHUB_EVENT_PATH=/github/event.json)
        fi
        docker run --rm \
          -v "${GITHUB_WORKSPACE}:/workspace" \
          "${event_mount[@]}" \
          -e GITHUB_TOKEN \
          -e GITHUB_REPOSITORY \
          -e GITHUB_API_URL \
          "${ECL_TRAINER_IMAGE}" \
          post-github-comment \
          --comment-path "${{ inputs.output_dir }}/pr-comment.md" || true

    - name: Upload local ECL Trainer artifacts
      if: inputs.upload_artifact == 'true'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: ${{ inputs.artifact_name }}
        if-no-files-found: error
        path: |
          ${{ inputs.output_dir }}/**
          ${{ inputs.ledger_path }}

    - name: Enforce ECL Trainer risk policy
      shell: bash
      run: |
        exit_code="$(cat "${{ inputs.output_dir }}/exit-code" 2>/dev/null || echo 1)"
        if [[ "${{ inputs.fail_on_payload_violation }}" != "true" && "${{ inputs.risk_policy }}" == "block_on_payload_violation" ]]; then
          exit 0
        fi
        exit "${exit_code}"
