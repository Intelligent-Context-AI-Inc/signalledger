ecl_trainer_scan:
  image: python:3.11
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
  script:
    - python -m pip install .
    - ecl-trainer gitlab-ci --project-namespace "${CI_PROJECT_PATH}" --ledger-path ".ecl-trainer/events.jsonl" --risk-policy "${ECL_RISK_POLICY:-report_only}"
  artifacts:
    when: always
    paths:
      - ecl-trainer-artifacts/ecl-report.md
      - ecl-trainer-artifacts/ecl-report.json
      - .ecl-trainer/events.jsonl
    expire_in: 14 days
